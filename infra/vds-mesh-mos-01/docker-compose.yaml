name: vds-mesh-mos-01

services:
  caddy:
    image: caddy:2.9-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./configs/headscale/avatars:/srv/avatars:ro
      - ../../infra/vds-vpn-nl-01/client:/srv/singbox:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mesh_network
    depends_on:
      - headscale
      - headplane

  headscale:
    image: headscale/headscale:0.27.0
    container_name: headscale
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./configs/headscale:/etc/headscale
      - headscale_data:/var/lib/headscale
    healthcheck:
      test: ["CMD", "headscale", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mesh_network
    ports:
      - "3478:3478/udp"
    expose:
      - "8080"
      - "9090"
    command: serve

  headplane:
    image: ghcr.io/tale/headplane:0.5.1
    container_name: headplane
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mesh_network
    expose:
      - "3000"
    volumes:
      - ./configs/headplane:/etc/headplane
      - ./configs/headscale:/etc/headscale
      - headplane_data:/var/lib/headplane
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - headscale

networks:
  mesh_network:
    name: mesh_network
    driver: bridge

volumes:
  headscale_data:
    name: headscale_data
  headplane_data:
    name: headplane_data
  caddy_data:
    name: caddy_data
  caddy_config:
    name: caddy_config
