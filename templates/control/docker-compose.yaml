name: control

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    restart: unless-stopped
    environment:
      - DOCKER_API_VERSION=1.47
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      traefik.enable: "true"
      traefik.http.routers.traefik.rule: "Host(`${TRAEFIK_DOMAIN}`)"
      traefik.http.routers.traefik.entrypoints: websecure
      traefik.http.routers.traefik.tls.certresolver: letsencrypt
      traefik.http.routers.traefik.service: api@internal
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./traefik/traefik.yaml:/etc/traefik/traefik.yaml:ro
      - letsencrypt:/letsencrypt
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - control_network

  panel:
    image: remnawave/backend:2.7.4
    container_name: remnawave-panel
    restart: unless-stopped
    env_file:
      - ./panel/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      traefik.enable: "true"
      traefik.http.routers.panel.rule: "Host(`${PANEL_DOMAIN}`)"
      traefik.http.routers.panel.entrypoints: websecure
      traefik.http.routers.panel.tls.certresolver: letsencrypt
      traefik.http.services.panel.loadbalancer.server.port: "3000"
    networks:
      - control_network

  postgres:
    image: postgres:17-alpine
    container_name: remnawave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: remnawave
      POSTGRES_USER: remnawave
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remnawave"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - control_network

  redis:
    image: redis:7-alpine
    container_name: remnawave-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - control_network

  subscription-page:
    image: remnawave/subscription-page:latest
    container_name: remnawave-subscription-page
    restart: unless-stopped
    env_file:
      - ./subscription/.env
    depends_on:
      - panel
    labels:
      traefik.enable: "true"
      traefik.http.routers.subscription.rule: "Host(`${SUB_DOMAIN}`)"
      traefik.http.routers.subscription.entrypoints: websecure
      traefik.http.routers.subscription.tls.certresolver: letsencrypt
      traefik.http.services.subscription.loadbalancer.server.port: "3010"
    networks:
      - control_network

  headscale:
    image: headscale/headscale:0.28.0
    container_name: headscale
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./headscale:/etc/headscale
      - headscale_data:/var/lib/headscale
    healthcheck:
      test: ["CMD", "headscale", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      traefik.enable: "true"
      traefik.http.routers.headscale.rule: "Host(`${MESH_DOMAIN}`)"
      traefik.http.routers.headscale.entrypoints: websecure
      traefik.http.routers.headscale.tls.certresolver: letsencrypt
      traefik.http.services.headscale.loadbalancer.server.port: "8080"
      traefik.http.services.headscale.loadbalancer.responseforwarding.flushinterval: "-1"
    networks:
      - control_network
    ports:
      - "3478:3478/udp"
    command: serve

  headplane:
    image: ghcr.io/tale/headplane:0.6.1
    container_name: headplane
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/admin"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      traefik.enable: "true"
      traefik.http.routers.headplane.rule: "Host(`${MESH_DOMAIN}`) && PathPrefix(`/admin`)"
      traefik.http.routers.headplane.entrypoints: websecure
      traefik.http.routers.headplane.tls.certresolver: letsencrypt
      traefik.http.services.headplane.loadbalancer.server.port: "3000"
    networks:
      - control_network
    volumes:
      - ./headplane:/etc/headplane
      - ./headscale:/etc/headscale
      - headplane_data:/var/lib/headplane
    depends_on:
      - headscale

networks:
  control_network:
    name: control_network
    driver: bridge

volumes:
  letsencrypt:
    name: letsencrypt
  postgres_data:
    name: postgres_data
  headscale_data:
    name: headscale_data
  headplane_data:
    name: headplane_data
