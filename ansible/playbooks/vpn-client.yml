---
# Deploy sing-box VPN client proxy to a host.
#
# Usage:
#   # Build config first (from repo root):
#   jsonnet --jpath templates/sing-box \
#     -o /tmp/client-server.json.tpl \
#     configs/vpn/hel-01/sing-box/client-server.jsonnet
#   envsubst < /tmp/client-server.json.tpl > /tmp/client-server.json
#
#   # Then deploy:
#   ansible-playbook ansible/playbooks/vpn-client.yml \
#     -e target_hosts=work-d-01 \
#     -e singbox_config_src=/tmp/client-server.json

- name: Deploy VPN client
  hosts: "{{ target_hosts | default('vpn_clients') }}"
  become: true

  roles:
    - role: sing-box-client
