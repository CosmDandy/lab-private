---
# Usage:
#   ansible-playbook -i ansible/inventory/hosts.yml ansible/playbooks/tailscale.yml \
#     -e target_hosts=vm_work --tags reinstall --ask-vault-pass
#
# Tags: install, authorize, uninstall, reinstall (= uninstall + install + authorize)

- name: Manage Tailscale
  hosts: "{{ target_hosts | default('pve_work') }}"
  become: true

  vars_files:
    - ../group_vars/vault-tailscale.yml

  roles:
    - tailscale
