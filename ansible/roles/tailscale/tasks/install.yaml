---
- name: Enable IP forwarding
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: "1"
    sysctl_set: true
    reload: true
  loop:
    - net.ipv4.ip_forward
    - net.ipv6.conf.all.forwarding

- name: Set architecture mapping
  ansible.builtin.set_fact:
    tailscale_arch: "{{ {'x86_64': 'amd64', 'aarch64': 'arm64'}[ansible_facts['architecture']] }}"

- name: Check Tailscale version
  ansible.builtin.command:
    cmd: tailscale version
  register: tailscale_installed
  failed_when: false
  changed_when: false

- name: Remove old binaries from /usr/local/bin
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /usr/local/bin/tailscale
    - /usr/local/bin/tailscaled

- name: Unarchive binary
  ansible.builtin.unarchive:
    src: files/{{ tailscale_arch }}/tailscale_{{ tailscale_version }}_{{ tailscale_arch }}.tgz
    dest: /tmp

- name: Copy files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: "{{ item.mode }}"
    remote_src: true
  loop:
    - {src: "/tmp/tailscale_{{ tailscale_version }}_{{ tailscale_arch }}/tailscale", dest: "/usr/sbin/tailscale", mode: "0755"}
    - {src: "/tmp/tailscale_{{ tailscale_version }}_{{ tailscale_arch }}/tailscaled", dest: "/usr/sbin/tailscaled", mode: "0755"}
    - {src: "/tmp/tailscale_{{ tailscale_version }}_{{ tailscale_arch }}/systemd/tailscaled.service", dest: "/etc/systemd/system/tailscaled.service", mode: "0644"}
    - {src: "/tmp/tailscale_{{ tailscale_version }}_{{ tailscale_arch }}/systemd/tailscaled.defaults", dest: "/etc/default/tailscaled", mode: "0644"}
  notify:
    - daemon_reload
    - restart_tailscaled

- name: Cleanup /tmp
  ansible.builtin.file:
    path: "/tmp/tailscale_{{ tailscale_version }}_{{ tailscale_arch }}"
    state: absent

- name: Start tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    state: started
    enabled: true

- name: Ensure tailscaled is running
  ansible.builtin.systemd:
    name: tailscaled
  register: tailscaled_service
  until: tailscaled_service.status.ActiveState == "active"
  retries: 5
  delay: 2
