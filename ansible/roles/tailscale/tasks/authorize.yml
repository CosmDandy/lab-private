- name: Build tailscale up command
  ansible.builtin.set_fact:
    ts_up_cmd: >-
      tailscale up --reset --authkey={{ ts_authkey }} --hostname={{ ts_hostname }} --login-server={{ ts_login_server }} {% if ts_accept_routes %}--accept-routes{% endif %} {% if ts_accept_dns %}--accept-dns{% endif %} {% if ts_advertise_exit_node %}--advertise-exit-node{% endif %} {% if ts_advertise_routes != '' %}--advertise-routes={{ ts_advertise_routes }}{% endif %} {% if ts_force_reauth %}--force-reauth{% endif %}

- name: Connect to Tailscale network
  ansible.builtin.command:
    cmd: "{{ ts_up_cmd }}"
  async: 30
  poll: 0
  register: ts_connect_job

- name: Reset SSH connection
  ansible.builtin.meta: reset_connection

- name: Wait for tailscale up to finish
  ansible.builtin.async_status:
    jid: "{{ ts_connect_job.ansible_job_id }}"
  register: ts_connect_result
  until: ts_connect_result.finished
  retries: 10
  delay: 5

- name: Get Tailscale IP
  ansible.builtin.command:
    cmd: tailscale ip -4
  register: ts_ip
  changed_when: false

- name: Display connection result
  ansible.builtin.debug:
    msg: "Connected: {{ ts_ip.stdout | default('No IP') }}"
