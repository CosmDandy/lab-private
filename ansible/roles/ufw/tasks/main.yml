---
- name: Install UFW
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Reset UFW to clean state
  ansible.builtin.command:
    cmd: ufw --force reset
  changed_when: true

- name: Set default incoming policy
  community.general.ufw:
    default: deny
    direction: incoming

- name: Set default outgoing policy
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Allow SSH
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    comment: SSH

- name: Allow configured ports
  community.general.ufw:
    rule: allow
    port: "{{ item.port }}"
    proto: "{{ item.proto }}"
    comment: "{{ item.comment }}"
  loop: "{{ ufw_rules }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled
