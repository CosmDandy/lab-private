---
- name: Validate config source
  ansible.builtin.assert:
    that: singbox_config_src | length > 0
    fail_msg: "singbox_config_src must be set to a local JSON config path"

- name: Deploy sing-box client config
  ansible.builtin.copy:
    src: "{{ singbox_config_src }}"
    dest: /etc/sing-box/config.json
    owner: root
    group: sing-box
    mode: "0640"
  notify: Restart sing-box

- name: Flush handlers
  ansible.builtin.meta: flush_handlers

- name: Wait for sing-box to start
  ansible.builtin.wait_for:
    port: "{{ singbox_listen_port }}"
    timeout: 15

- name: Verify sing-box is running
  ansible.builtin.command:
    cmd: sing-box check -C /etc/sing-box
  changed_when: false
