name: control

services:
  caddy:
    image: caddy:2.9-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - control_network

  panel:
    image: remnawave/backend:2.7.4
    container_name: remnawave-panel
    restart: unless-stopped
    env_file:
      - ./panel/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - control_network

  postgres:
    image: postgres:17-alpine
    container_name: remnawave-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: remnawave
      POSTGRES_USER: remnawave
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remnawave"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - control_network

  redis:
    image: redis:7-alpine
    container_name: remnawave-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - control_network

  subscription-page:
    image: remnawave/subscription-page:latest
    container_name: remnawave-subscription-page
    restart: unless-stopped
    env_file:
      - ./subscription/.env
    depends_on:
      - panel
    networks:
      - control_network

  headscale:
    image: headscale/headscale:0.28.0
    container_name: headscale
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./headscale:/etc/headscale
      - headscale_data:/var/lib/headscale
    healthcheck:
      test: ["CMD", "headscale", "health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - control_network
    ports:
      - "3478:3478/udp"
    command: serve

  headplane:
    image: ghcr.io/tale/headplane:0.6.2
    container_name: headplane
    restart: unless-stopped
    networks:
      - control_network
    volumes:
      - ./headplane:/etc/headplane
      - ./headscale:/etc/headscale
      - headplane_data:/var/lib/headplane
    depends_on:
      - headscale

networks:
  control_network:
    name: control_network
    driver: bridge

volumes:
  caddy_data:
    name: caddy_data
  caddy_config:
    name: caddy_config
  postgres_data:
    name: postgres_data
  headscale_data:
    name: headscale_data
  headplane_data:
    name: headplane_data
