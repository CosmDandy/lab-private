name: vpn

services:
  caddy:
    image: caddy:2.9-alpine
    container_name: caddy
    restart: unless-stopped
    init: true
    ports:
      - "80:80"
      - "443:443/tcp"
    volumes:
      - caddy_data:/data
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./client:/srv/configs:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:2019/config/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  sing-box:
    image: ghcr.io/sagernet/sing-box:latest
    container_name: sing-box
    restart: unless-stopped
    environment:
      ENABLE_DEPRECATED_LEGACY_DOMAIN_STRATEGY_OPTIONS: "true"
    volumes:
      - ./sing-box:/etc/sing-box
    healthcheck:
      test: ["CMD", "sing-box", "check", "-c", "/etc/sing-box/config.json"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    ports:
      - "443:443/udp"
      - "2053:2053/tcp"
      - "2083:2083/tcp"
      - "64444:64444/tcp"
      - "2087:2087/tcp"
      - "8444:8444/udp"
      - "8388:8388/tcp"
      - "8445:8445/tcp"
      - "8389:8389/tcp"
      - "8446:8446/tcp"
    cap_add:
      - NET_ADMIN
    command: run -c /etc/sing-box/config.json

volumes:
  caddy_data:
