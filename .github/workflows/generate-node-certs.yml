name: "Setup: node certificates"
on:
  workflow_dispatch:
    inputs:
      nodes:
        description: "Node names (comma-separated, e.g. htz-hel-02,htz-fsn-01)"
        required: true
        type: string

jobs:
  generate:
    runs-on: hcloud-htz-hel-01
    environment: htz-hel-01
    steps:
      - name: Generate and store SSL_CERT for each node
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODES: ${{ inputs.nodes }}
        run: |
          IFS=',' read -ra NODE_LIST <<< "$NODES"
          for node in "${NODE_LIST[@]}"; do
            node=$(echo "$node" | xargs)
            echo "Generating SSL_CERT for $node..."
            SSL_CERT=$(docker exec remnawave-panel node -e '
              const{PrismaClient}=require("@prisma/client");
              const{generateNodeCert}=require("./dist/src/common/utils/certs");
              const{encodeCertPayload}=require("./dist/src/common/utils/certs/encode-node-payload");
              const p=new PrismaClient({datasources:{db:{url:process.env.DATABASE_URL}}});
              (async()=>{
                const k=await p.keygen.findFirst();
                const{nodeCertPem,nodeKeyPem}=await generateNodeCert(k.caCert,k.caKey);
                console.log(encodeCertPayload({nodeCertPem,nodeKeyPem,caCertPem:k.caCert,jwtPublicKey:k.pubKey}));
                await p.$disconnect();
              })();
            ')
            gh secret set SSL_CERT \
              --repo "${{ github.repository }}" \
              --env "$node" \
              --body "$SSL_CERT"
            echo "SSL_CERT set for $node"
          done
