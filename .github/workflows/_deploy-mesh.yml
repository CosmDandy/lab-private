name: "Deploy Mesh (reusable)"
on:
  workflow_call:
    inputs:
      server:
        required: true
        type: string

jobs:
  deploy:
    runs-on: hcloud-mesh-${{ inputs.server }}
    environment: mesh-${{ inputs.server }}
    env:
      CONFIG_DIR: configs/mesh/${{ inputs.server }}
      COMPOSE_PROJECT_DIR: /opt/vpn-infra
    steps:
      - uses: actions/checkout@v6

      - name: Validate compose
        run: docker compose -f $CONFIG_DIR/docker-compose.yaml config --quiet

      - name: Render configs
        env:
          SERVER_ADDRESS: ${{ vars.SERVER_ADDRESS }}
          SERVER_IPV4: ${{ vars.SERVER_IPV4 }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL }}
          CADDY_USER: ${{ vars.CADDY_USER }}
          CADDY_HASH: ${{ secrets.CADDY_HASH }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
        run: |
          vars='$SERVER_ADDRESS $SERVER_IPV4 $ACME_EMAIL $CADDY_USER $CADDY_HASH $COOKIE_SECRET'
          for tpl in $CONFIG_DIR/caddy/*.tpl \
                     $CONFIG_DIR/headplane/*.tpl \
                     $CONFIG_DIR/headscale/*.tpl; do
            envsubst "$vars" < "$tpl" > "${tpl%.tpl}"
          done

      - name: Sync configs to deploy directory
        run: |
          sudo rsync -a --delete \
            --exclude='*.tpl' \
            "$CONFIG_DIR/" "$COMPOSE_PROJECT_DIR/"

      - name: Deploy
        working-directory: /opt/vpn-infra
        run: |
          docker compose pull
          docker compose up -d --remove-orphans --force-recreate

      - name: Verify
        working-directory: /opt/vpn-infra
        run: |
          timeout 30 bash -c '
            until docker compose ps --format json 2>/dev/null \
              | jq -se "[.[] | select(.State != \"running\")] | length == 0" > /dev/null 2>&1
            do sleep 1; done
          ' || {
            docker compose logs --tail 20
            exit 1
          }
