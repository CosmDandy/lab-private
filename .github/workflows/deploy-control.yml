name: "Deploy: control"
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - stacks/control/**
      - data/subscription/**
      - data/panel/**
      - scripts/panel-sync.sh
      - scripts/subscription-sync.sh

jobs:
  deploy:
    runs-on: hcloud-htz-hel-01
    environment: htz-hel-01
    env:
      TEMPLATE_DIR: stacks/control
      DEPLOY_DIR: /opt/control
      SERVER_ADDRESS: ${{ vars.SERVER_ADDRESS }}
      SERVER_IPV4: ${{ vars.SERVER_IPV4 }}
      ACME_EMAIL: ${{ vars.ACME_EMAIL }}
      PANEL_DOMAIN: ${{ vars.PANEL_DOMAIN }}
      MESH_DOMAIN: ${{ vars.MESH_DOMAIN }}
      SUB_DOMAIN: ${{ vars.SUB_DOMAIN }}
      JWT_AUTH_SECRET: ${{ secrets.JWT_AUTH_SECRET }}
      JWT_API_TOKENS_SECRET: ${{ secrets.JWT_API_TOKENS_SECRET }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
      METRICS_PASS: ${{ secrets.METRICS_PASS }}
      REALITY_PRIVATE_KEY: ${{ secrets.REALITY_PRIVATE_KEY }}
      REALITY_SHORT_ID: ${{ secrets.REALITY_SHORT_ID }}
      PANEL_API_TOKEN: ${{ secrets.PANEL_API_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - name: Render templates
        run: |
          for f in $(find stacks/control -name '*.tpl'); do
            envsubst < "$f" > "${f%.tpl}"
          done

      - name: Validate compose
        run: docker compose -f $TEMPLATE_DIR/docker-compose.yaml config --quiet

      - name: Deploy
        run: |
          sudo rsync -a --delete \
            --exclude='*.tpl' \
            "$TEMPLATE_DIR/" "$DEPLOY_DIR/"
          cd "$DEPLOY_DIR" && docker compose pull && docker compose up -d --remove-orphans

      - name: Verify
        working-directory: /opt/control
        run: |
          timeout 60 bash -c '
            until docker compose ps --format json 2>/dev/null \
              | jq -se "[.[] | select(.State != \"running\")] | length == 0" > /dev/null 2>&1
            do sleep 2; done
          ' || {
            docker compose logs --tail 30
            exit 1
          }

      - name: Sync Panel config (profiles, nodes, hosts)
        env:
          PANEL_URL: https://${{ vars.PANEL_DOMAIN }}
          API_TOKEN: ${{ secrets.PANEL_API_TOKEN }}
        run: bash scripts/panel-sync.sh data/panel/config.json

      - name: Sync subscription templates
        env:
          PANEL_URL: https://${{ vars.PANEL_DOMAIN }}
          API_TOKEN: ${{ secrets.PANEL_API_TOKEN }}
        run: bash scripts/subscription-sync.sh data/subscription
