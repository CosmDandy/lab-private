name: "Deploy: nodes"
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - stacks/node/**

jobs:
  deploy:
    strategy:
      matrix:
        node: [htz-hel-02]
    runs-on: hcloud-${{ matrix.node }}
    environment: ${{ matrix.node }}
    env:
      TEMPLATE_DIR: stacks/node
      DEPLOY_DIR: /opt/node
    steps:
      - uses: actions/checkout@v6

      - name: Render templates
        env:
          SSL_CERT: ${{ secrets.SSL_CERT }}
        run: |
          for f in $(find $TEMPLATE_DIR -name '*.tpl'); do
            envsubst < "$f" > "${f%.tpl}"
          done

      - name: Validate compose
        run: docker compose -f $TEMPLATE_DIR/docker-compose.yaml config --quiet

      - name: Deploy
        run: |
          sudo rsync -a --delete \
            --exclude='*.tpl' \
            "$TEMPLATE_DIR/" "$DEPLOY_DIR/"
          cd "$DEPLOY_DIR" && docker compose pull && docker compose up -d --remove-orphans

      - name: Verify
        working-directory: /opt/node
        run: |
          timeout 30 bash -c '
            until docker compose ps --format json 2>/dev/null \
              | jq -se "[.[] | select(.State != \"running\")] | length == 0" > /dev/null 2>&1
            do sleep 1; done
          ' || {
            docker compose logs --tail 20
            exit 1
          }
