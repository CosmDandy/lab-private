name: "Backup: mesh-hel-01"
on:
  schedule:
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  backup:
    runs-on: hcloud-mesh-hel-01
    environment: mesh-hel-01
    env:
      S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
      S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
      S3_BUCKET: ${{ vars.S3_BUCKET }}
      S3_ENDPOINT: ${{ vars.S3_ENDPOINT }}
    steps:
      - uses: actions/checkout@v6

      - name: Run backup
        run: sudo -E scripts/backup-headscale-s3.sh
