name: "Deploy: vds-mesh-mos-01"
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - infra/vds-mesh-mos-01/**
      - .github/workflows/deploy-mesh.yml

jobs:
  validate:
    runs-on: [vds-mesh-mos-01]
    steps:
      - uses: actions/checkout@v6
      - name: Validate compose
        run: docker compose -f infra/vds-mesh-mos-01/docker-compose.yaml config --quiet

  deploy:
    needs: validate
    runs-on: [vds-mesh-mos-01]
    environment: vds-mesh-mos-01
    env:
      DEPLOY_DIR: /opt/lab-private
      COMPOSE_FILE: infra/vds-mesh-mos-01/docker-compose.yaml
    steps:
      - uses: actions/checkout@v6

      - name: Generate configs
        env:
          DOMAIN: ${{ vars.DOMAIN }}
          SERVER_IP: ${{ vars.SERVER_IP }}
          ACME_EMAIL: ${{ vars.ACME_EMAIL }}
          CADDY_USER: ${{ secrets.CADDY_USER }}
          CADDY_HASH: ${{ secrets.CADDY_HASH }}
          COOKIE_SECRET: ${{ secrets.COOKIE_SECRET }}
        run: |
          vars='$DOMAIN $SERVER_IP $ACME_EMAIL $CADDY_USER $CADDY_HASH $COOKIE_SECRET'
          for tpl in \
            infra/vds-mesh-mos-01/configs/caddy/*.tpl \
            infra/vds-mesh-mos-01/configs/headplane/*.tpl \
            infra/vds-mesh-mos-01/configs/headscale/*.tpl; do
            envsubst "$vars" < "$tpl" > "${tpl%.tpl}"
          done

      - name: Sync
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='*.tpl' \
            "$GITHUB_WORKSPACE/" "$DEPLOY_DIR/"

      - name: Deploy
        working-directory: /opt/lab-private
        run: |
          docker compose -f "$COMPOSE_FILE" pull
          docker compose -f "$COMPOSE_FILE" config --services \
            | xargs -r docker rm -f 2>/dev/null || true
          docker compose -f "$COMPOSE_FILE" up -d --remove-orphans

      - name: Verify
        working-directory: /opt/lab-private
        run: |
          timeout 30 bash -c '
            until docker compose -f "$COMPOSE_FILE" ps --format json 2>/dev/null \
              | jq -se "[.[] | select(.State != \"running\")] | length == 0" > /dev/null 2>&1
            do sleep 1; done
          ' || {
            docker compose -f "$COMPOSE_FILE" logs --tail 20
            exit 1
          }

      - name: Firewall
        run: |
          sudo ufw default deny incoming
          sudo ufw default allow outgoing
          sudo ufw allow 22/tcp  comment 'SSH'
          sudo ufw allow 80/tcp  comment 'Caddy HTTP'
          sudo ufw allow 443/tcp comment 'Caddy HTTPS + DERP'
          sudo ufw allow 3478/udp comment 'STUN'
          sudo ufw --force enable
          sudo ufw status verbose
