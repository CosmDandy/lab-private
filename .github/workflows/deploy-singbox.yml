name: "Deploy: vds-vpn-nl-01"
on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Ref to deploy (leave empty for latest)'
        default: ''
  push:
    branches: [master]
    paths:
      - infra/vds-vpn-nl-01/**
      - clients/sing-box/lib/**
      - .github/workflows/deploy-singbox.yml
      - .github/workflows/_deploy-vpn.yml
jobs:
  deploy:
    uses: ./.github/workflows/_deploy-vpn.yml
    with:
      runner: vds-vpn-nl-01
      environment: vds-vpn-nl-01
      server: vds-vpn-nl-01
      ref: ${{ inputs.ref || '' }}
    secrets: inherit
