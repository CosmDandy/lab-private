name: "Deploy: sing-box"
on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - configs/sing-box/**
      - docker-compose/sing-box.yaml
      - docker-compose.yaml
      - .github/workflows/deploy-singbox.yml
jobs:
  validate:
    runs-on: [vds-vpn-nl-01]
    steps:
      - uses: actions/checkout@v6
      - name: Validate compose
        run: docker compose -f docker-compose/sing-box.yaml config --quiet
  deploy:
    needs: validate
    runs-on: [vds-vpn-nl-01]
    environment: production
    env:
      COMPOSE_PROJECT_DIR: /opt/lab-private
    steps:
      - uses: actions/checkout@v6
      - name: Render configs
        env:
          VPN_SERVER_IP: ${{ vars.VPN_SERVER_IP }}
          VLESS_UUID: ${{ secrets.VLESS_UUID }}
          REALITY_PRIVATE_KEY: ${{ secrets.REALITY_PRIVATE_KEY }}
          REALITY_PUBLIC_KEY: ${{ vars.REALITY_PUBLIC_KEY }}
          REALITY_SHORT_ID: ${{ secrets.REALITY_SHORT_ID }}
          HY2_PASSWORD: ${{ secrets.HY2_PASSWORD }}
          SALAMANDER_PASSWORD: ${{ secrets.SALAMANDER_PASSWORD }}
          TUIC_PASSWORD: ${{ secrets.TUIC_PASSWORD }}
          SHADOWTLS_PASSWORD: ${{ secrets.SHADOWTLS_PASSWORD }}
          SS_PASSWORD: ${{ secrets.SS_PASSWORD }}
          TROJAN_PASSWORD: ${{ secrets.TROJAN_PASSWORD }}
          SS_PLAIN_PASSWORD: ${{ secrets.SS_PLAIN_PASSWORD }}

        run: |
          for tpl in configs/sing-box/*.json.tpl; do
            envsubst < "$tpl" > "${tpl%.tpl}"
          done
      - name: Upload client configs
        uses: actions/upload-artifact@v7
        with:
          name: sing-box-client-configs
          path: |
            configs/sing-box/client-base.json
            configs/sing-box/client-mobile.json
            configs/sing-box/client-linux.json
          retention-days: 7
      - name: Sync files to deploy directory
        run: |
          rsync -a --delete \
            --exclude='.git' \
            --exclude='configs/sing-box/tls/' \
            --exclude='*.tpl' \
            "$GITHUB_WORKSPACE/" "$COMPOSE_PROJECT_DIR/"
      - name: Deploy
        working-directory: /opt/lab-private
        run: |
          docker compose -f docker-compose/sing-box.yaml pull
          docker compose -f docker-compose/sing-box.yaml up -d --remove-orphans
          docker compose -f docker-compose/sing-box.yaml restart
      - name: Healthcheck
        working-directory: /opt/lab-private
        run: |
          sleep 3
          docker compose -f docker-compose/sing-box.yaml ps
          if docker compose -f docker-compose/sing-box.yaml ps --format json | jq -e '.[] | select(.State != "running")' > /dev/null 2>&1; then
            echo "Some containers are not running!"
            docker compose -f docker-compose/sing-box.yaml logs --tail 20
            exit 1
          fi
      - name: Configure firewall
        run: |
          sudo ufw --force reset
          sudo ufw default deny incoming
          sudo ufw default allow outgoing
          sudo ufw allow 22/tcp comment 'SSH'
          sudo ufw allow 443/tcp comment 'VLESS Reality gRPC'
          sudo ufw allow 2053/tcp comment 'VLESS Reality gRPC'
          sudo ufw allow 2083/tcp comment 'VLESS Reality gRPC'
          sudo ufw allow 64444/tcp comment 'VLESS Reality gRPC'
          sudo ufw allow 2087/tcp comment 'VLESS Reality HTTPUpgrade'
          sudo ufw allow 8443/udp comment 'Hysteria2 Salamander'
          sudo ufw allow 8444/udp comment 'TUIC v5'
          sudo ufw allow 8388/tcp comment 'ShadowTLS + Shadowsocks'
          sudo ufw allow 8445/tcp comment 'Trojan'
          sudo ufw allow 8389/tcp comment 'Shadowsocks plain'
          sudo ufw --force enable
          sudo ufw status verbose
